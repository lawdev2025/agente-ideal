<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#8E1620" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CRM IDEAL" />
  <link rel="manifest" href="/app/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/app/icons/icon-192.png" />
  <link rel="icon" href="/app/icons/icon-192.png" />
  <title>CRM IDEAL</title>
  <link rel="stylesheet" href="/app/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
</head>
<body>
  <!-- ============ LOGIN ============ -->
  <section id="screen-login" class="screen screen-login active">
    <div class="login-box">
      <div class="login-logo">
        <img src="/app/icons/icon-512.png" alt="ideal CRM" />
      </div>
      <p class="login-sub">Atendimento em tempo real</p>
      <input id="login-token" type="password" inputmode="text" placeholder="Token de acesso (ADMIN_TOKEN)" autocomplete="current-password" />
      <button id="login-btn" class="btn-primary">Entrar</button>
      <p id="login-error" class="login-error"></p>
    </div>
  </section>

  <!-- ============ LISTA DE CONVERSAS ============ -->
  <section id="screen-list" class="screen screen-list">
    <header class="app-header">
      <h2>CRM IDEAL</h2>
      <div class="header-actions">
        <button id="notif-btn" class="icon-btn" title="Ativar notificações" aria-label="Ativar notificações">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4a1.5 1.5 0 0 0-3 0v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
        </button>
        <button id="logout-btn" class="icon-btn" title="Sair" aria-label="Sair">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M16 13v-2H7V8l-5 4 5 4v-3h9zM20 3h-9a2 2 0 0 0-2 2v4h2V5h9v14h-9v-4H9v4a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg>
        </button>
      </div>
    </header>
    <div class="search-bar">
      <input id="search-input" type="search" placeholder="Pesquisar conversa" />
    </div>
    <div id="conn-banner" class="conn-banner hidden"></div>
    <ul id="contacts-list" class="contacts-list"></ul>
    <div id="list-empty" class="list-empty hidden">Nenhuma conversa ainda.</div>
  </section>

  <!-- ============ CHAT ============ -->
  <section id="screen-chat" class="screen screen-chat">
    <header class="chat-header">
      <button id="back-btn" class="icon-btn" aria-label="Voltar">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z"/></svg>
      </button>
      <div class="chat-avatar" id="chat-avatar">?</div>
      <div class="chat-peer">
        <span id="chat-name" class="chat-name">Contato</span>
        <span id="chat-status" class="chat-status">—</span>
      </div>
    </header>

    <div id="messages" class="messages"></div>

    <!-- Botao flutuante de controle Bot vs Manual -->
    <button id="bot-toggle" class="bot-toggle">
      <span id="bot-toggle-icon">⏸</span>
      <span id="bot-toggle-label">Pausar Bot</span>
    </button>

    <div class="composer" id="composer">
      <textarea id="composer-input" rows="1" placeholder="Bot operando. Assuma o controle para digitar." disabled></textarea>
      <button id="send-btn" class="send-btn" disabled aria-label="Enviar">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </section>

  <div id="toast" class="toast hidden"></div>

  <script src="/app/app.js" defer></script>
</body>
</html>
