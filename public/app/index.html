<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#8E1620" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ideal CRM" />
  <link rel="manifest" href="/app/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/app/icons/icon-192.png" />
  <link rel="icon" href="/app/icons/icon-192.png" />
  <title>ideal CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/app/ideal-ui.css" />
  <link rel="stylesheet" href="/app/proto.css" />
  <link rel="stylesheet" href="/app/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
</head>
<body>
<div id="ideal-root" class="ideal light">
  <!-- ============ DRAWER LATERAL (acessa o admin) ============ -->
  <aside id="app-drawer" class="app-drawer">
    <div class="drawer-brand">
      <span class="drawer-badge">id</span>
      <div><b>ideal</b><small>CRM</small></div>
    </div>
    <nav class="drawer-nav">
      <button class="drawer-item active" id="drawer-conversas">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M4 4h16v12H7l-3 3z"></path></svg> Conversas
      </button>
      <a class="drawer-item" href="/admin#dashboard">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 13h8V3H3zM13 21h8V3h-8zM3 21h8v-6H3z"></path></svg> Dashboard
      </a>
      <a class="drawer-item" href="/admin#banco">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><ellipse cx="12" cy="6" rx="8" ry="3"></ellipse><path d="M4 6v12c0 1.7 3.6 3 8 3s8-1.3 8-3V6"></path></svg> Gerenciar Banco
      </a>
      <a class="drawer-item" href="/admin#config">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm9 4l-2 1 1 2-2 2-2-1-1 2h-2l-1-2-2 1-2-2 1-2-2-1v-2l2-1-1-2 2-2 2 1 1-2h2l1 2 2-1 2 2-1 2z"></path></svg> Configurações
      </a>
    </nav>
    <div class="drawer-foot">
      <span class="drawer-avatar">A</span>
      <div><b>Time Ideal</b><small>online</small></div>
      <span class="drawer-online"></span>
    </div>
  </aside>
  <div id="drawer-overlay" class="drawer-overlay"></div>

  <!-- ============ LOGIN (A — imersivo vermelho) ============ -->
  <section id="screen-login" class="screen active">
    <div class="scr scr-login">
      <div class="login-wrap">
        <div class="login-brand card-in">
          <div class="id-badge"><span>id</span></div>
          <h1>ideal <span>CRM</span></h1>
          <p class="login-sub">Atendimento WhatsApp em tempo real</p>
        </div>
        <div class="card login-card card-in" style="--d:.12s">
          <label class="login-label">Token de acesso</label>
          <input id="login-token" class="tok-field" type="password" inputmode="text"
                 placeholder="••••••••" autocomplete="current-password" maxlength="48" />
          <button id="login-btn" class="btn">Entrar</button>
          <p id="login-error" class="login-error"></p>
          <p class="login-note">Acesso restrito ao time de atendimento</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ LISTA (B — cards flutuantes + swipe + pull-to-refresh) ============ -->
  <section id="screen-list" class="screen">
    <div class="scr">
      <div class="red-head list-head">
        <div class="head-top">
          <div>
            <p class="greeting" id="greeting">Olá,</p>
            <h1 class="head-name">Time Ideal</h1>
          </div>
          <div class="head-actions">
            <button id="menu-btn" class="head-round tap" aria-label="Menu" title="Menu">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"></path></svg>
            </button>
            <button id="notif-btn" class="head-round tap" title="Ativar notificações" aria-label="Ativar notificações">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4a1.5 1.5 0 0 0-3 0v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
            </button>
            <button id="theme-btn" class="head-round tap theme-ic" aria-label="Alternar tema" title="Alternar tema">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12.3 3a9 9 0 1 0 8.7 11.3A7.2 7.2 0 0 1 12.3 3z"></path></svg>
            </button>
            <button id="logout-btn" class="head-round tap" title="Sair" aria-label="Sair">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 13v-2H7V8l-5 4 5 4v-3h9zM20 3h-9a2 2 0 0 0-2 2v4h2V5h9v14h-9v-4H9v4a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/></svg>
            </button>
          </div>
        </div>
        <div class="stat-tiles">
          <div class="stat-tile"><b id="stat-conversas">0</b><span>conversas</span></div>
          <div class="stat-tile"><b id="stat-bot">0</b><span>no bot</span></div>
          <div class="stat-tile"><b id="stat-time">0</b><span>com o time</span></div>
        </div>
      </div>

      <div id="conn-banner" class="conn-banner hidden"></div>

      <div class="list-sheet">
        <div class="search list-search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4.5-4.5"></path></svg>
          <input id="search-input" type="search" placeholder="Pesquisar conversa" />
        </div>

        <!-- indicador pull-to-refresh -->
        <div class="ptr-host"><span id="ptr-spin" class="ptr-spin"></span></div>

        <div id="contacts-list" class="list-scroll"></div>
        <div id="list-empty" class="list-empty hidden">Nenhuma conversa ainda.</div>
      </div>
    </div>
  </section>

  <!-- ============ CHAT (A — header vermelho + folha + bolha sólida) ============ -->
  <section id="screen-chat" class="screen">
    <div class="scr">
      <div class="red-head chat-head">
        <button id="back-btn" class="head-back tap" aria-label="Voltar">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"></path></svg>
        </button>
        <div class="avatar chat-avatar-wrap" id="chat-avatar">··</div>
        <div class="chat-peer">
          <b class="chat-name" id="chat-name">Conversa</b>
          <span class="chat-sub"><span id="chat-dot" class="hdr-dot bot"></span><span id="chat-status">Bot ativo</span></span>
        </div>
      </div>

      <div class="sheet chat-sheet">
        <div id="messages" class="messages"></div>

        <div class="pill-row">
          <button id="bot-toggle" class="pill-toggle pause tap">
            <span id="bot-toggle-icon" class="pill-ic"></span>
            <span id="bot-toggle-label">Pausar bot e assumir</span>
          </button>
        </div>

        <div class="composer">
          <textarea id="composer-input" rows="1" placeholder="Bot operando — pause para responder" disabled></textarea>
          <button id="send-btn" class="send off tap" aria-label="Enviar" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </section>

</div>

<div id="toast" class="toast hidden"></div>

<script src="/app/app.js?v=5" defer></script>
</body>
</html>
