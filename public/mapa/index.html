<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Mapa Demográfico • Colégio Ideal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --red:#D32F2F; --red-d:#9E1B1B; --belem:#D32F2F; --anan:#1E88A8; --mari:#F9A825; --outro:#7E57C2;
  --bg:#F4F5F7; --surface:#FFFFFF; --surface-2:#FAFBFC; --text:#23272E; --muted:#6B7280;
  --border:#E4E7EC; --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
  --shadow-lg:0 8px 24px rgba(16,24,40,.12);
}
[data-theme="dark"]{
  --bg:#15171C; --surface:#1E2128; --surface-2:#23272F; --text:#E7EAEE; --muted:#9AA1AC;
  --border:#2C313A; --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 10px 30px rgba(0,0,0,.5);
  --belem:#FF6B6B; --anan:#3FB6D6;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Lato',system-ui,sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;overflow:hidden}
h1,h2,h3,.q{font-family:'Quicksand',sans-serif}
/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow);
  display:flex;align-items:center;gap:16px;padding:10px 18px;z-index:1000;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px;min-width:max-content}
.brand .mark{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--red-d));
  display:grid;place-items:center;color:#fff;font-family:'Quicksand';font-weight:700;font-size:20px;
  box-shadow:0 2px 8px rgba(211,47,47,.35)}
.brand h1{font-size:17px;font-weight:700;margin:0;line-height:1.1}
.brand p{margin:0;font-size:11.5px;color:var(--muted);letter-spacing:.3px}
.filters{display:flex;gap:10px;align-items:center;flex:1;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
select{font-family:'Lato';font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:9px;
  background:var(--surface-2);color:var(--text);cursor:pointer;min-width:130px;outline:none}
select:focus{border-color:var(--red)}
.tools{display:flex;gap:8px;align-items:center}
.btn{font-family:'Quicksand';font-weight:600;font-size:12.5px;padding:8px 12px;border:1px solid var(--border);
  border-radius:9px;background:var(--surface-2);color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--red);color:var(--red)}
.btn.active{background:var(--red);color:#fff;border-color:var(--red)}
/* Body */
.main{flex:1;display:flex;min-height:0}
aside{width:330px;min-width:330px;background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px}
#map{flex:1;min-width:0}
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.kpi{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px}
.kpi .v{font-family:'Quicksand';font-weight:700;font-size:23px;line-height:1}
.kpi .l{font-size:11px;color:var(--muted);margin-top:4px}
.kpi.red .v{color:var(--red)}
.section{margin-bottom:20px}
.section h3{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);
  margin:0 0 10px;font-weight:700}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12.5px;cursor:default}
.bar-row .nm{width:108px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.bar-track{flex:1;height:9px;background:var(--border);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;background:var(--red);transition:width .35s}
.bar-row .ct{width:34px;text-align:right;font-weight:700;font-family:'Quicksand';font-size:12px}
.rank .bar-row{cursor:pointer;padding:2px 4px;border-radius:7px}
.rank .bar-row:hover{background:var(--surface-2)}
.rank .city-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend{position:absolute;z-index:600;bottom:18px;right:12px;background:var(--surface);
  border:1px solid var(--border);border-radius:11px;padding:11px 13px;box-shadow:var(--shadow-lg);font-size:12px}
.legend h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.legend .it{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.legend .it span{width:12px;height:12px;border-radius:50%;display:inline-block}
.legend .sizes{display:flex;align-items:flex-end;gap:9px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.legend .sizes div{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px}
.legend .sizes i{border:2px solid var(--muted);border-radius:50%;display:block}
/* Popup */
.leaflet-popup-content-wrapper{border-radius:12px;box-shadow:var(--shadow-lg)}
.pop{font-family:'Lato';min-width:210px}
.pop h3{font-family:'Quicksand';margin:0 0 2px;font-size:15px}
.pop .city{font-size:11px;color:var(--muted);margin-bottom:8px}
.pop .big{font-family:'Quicksand';font-weight:700;font-size:26px;color:var(--red);line-height:1}
.pop .big small{font-size:12px;color:var(--muted);font-weight:400;font-family:'Lato'}
.pop .grp{margin-top:9px;font-size:12px}
.pop .grp b{display:block;font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:3px}
.pop .pill{display:inline-block;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;
  padding:2px 8px;margin:2px 3px 0 0;font-size:11px}
footer{font-size:10.5px;color:var(--muted);padding:6px 18px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
footer a{color:var(--red);text-decoration:none}
@media(max-width:860px){
  .main{flex-direction:column-reverse}
  aside{width:100%;min-width:0;max-height:42vh;border-right:none;border-top:1px solid var(--border)}
  #map{height:58vh}
  .brand h1{font-size:15px}
}
</style>
</head>

  <div id="map"></div>
</div>
<footer>

fill(document.getElementById('f-filial'),FIL,'Todas as filiais');
fill(document.getElementById('f-curso'),CUR,'Todos os cursos');
fill(document.getElementById('f-sexo'),SEX.map(s=>({'M':'Masculino','F':'Feminino','N/I':'Não informado'}[s]||s)),'Ambos os sexos');
let colorByFilial=false;

function activeFilters(){
  return{f:+document.getElementById('f-filial').value,
         c:+document.getElementById('f-curso').value,
         s:+document.getElementById('f-sexo').value};
}
function compute(){
  const {f,c,s}=activeFilters();
  const counts=B.map(()=>({total:0,fil:{},cur:{},sex:{}}));
  let totalShown=0;
  for(const st of DATA.students){
    if(f>=0&&st[1]!==f)continue;
    if(c>=0&&st[2]!==c)continue;
    if(s>=0&&st[3]!==s)continue;
    const o=counts[st[0]];o.total++;totalShown++;
    o.fil[st[1]]=(o.fil[st[1]]||0)+1;
    o.cur[st[2]]=(o.cur[st[2]]||0)+1;
    o.sex[st[3]]=(o.sex[st[3]]||0)+1;
  }
  return{counts,totalShown};
}
function dominantFilial(o){let best=-1,bv=-1;for(const k in o.fil){if(o.fil[k]>bv){bv=o.fil[k];best=+k;}}return best;}

function render(){
  const {counts,totalShown}=compute();
  layer.clearLayers();
  let nb=0,belem=0,anan=0;
  const maxT=Math.max(1,...counts.map(o=>o.total));
  B.forEach((b,i)=>{
    const o=counts[i]; if(!o.total)return; nb++;
    if(b.cidade==='Belém')belem+=o.total; else if(b.cidade==='Ananindeua')anan+=o.total;
    const r=6+22*Math.sqrt(o.total/maxT);
    const col=colorByFilial?FIL_PAL[dominantFilial(o)]||cssVar('--outro'):cityColor(b.cidade);
    const m=L.circleMarker([b.lat,b.lon],{radius:r,color:col,weight:1.5,
      fillColor:col,fillOpacity:.55,opacity:.9});
    m.bindTooltip(`<b>${b.nome}</b> · ${o.total} aluno(s)`,{direction:'top'});
    m.bindPopup(popupHtml(b,o),{maxWidth:300});
    m.addTo(layer);
  });
  // KPIs
  document.getElementById('k-alunos').textContent=totalShown.toLocaleString('pt-BR');
  document.getElementById('k-bairros').textContent=nb;
  document.getElementById('k-belem').textContent=totalShown?Math.round(100*belem/totalShown)+'%':'0%';
  document.getElementById('k-anan').textContent=totalShown?Math.round(100*anan/totalShown)+'%':'0%';
  renderCharts(counts,totalShown);
}
function popupHtml(b,o){
  const fil=Object.entries(o.fil).sort((a,c)=>c[1]-a[1]).map(([k,v])=>`<span class="pill">${FIL[k]}: ${v}</span>`).join('');
  const cur=Object.entries(o.cur).sort((a,c)=>c[1]-a[1]).map(([k,v])=>`<span class="pill">${CUR[k]}: ${v}</span>`).join('');
  const sx=Object.entries(o.sex).sort((a,c)=>c[1]-a[1]).map(([k,v])=>`<span class="pill">${({'0':'M','1':'F','2':'N/I'}[k])}: ${v}</span>`).join('');
  const ruas=(b.ruas||[]).slice(0,5).map(r=>`<span class="pill">${r[0]} (${r[1]})</span>`).join('');
  return `<div class="pop"><h3>${b.nome}</h3><div class="city">${b.cidade}</div>
    <div class="big">${o.total}<small> aluno(s) no filtro</small></div>
    <div class="grp"><b>Filial</b>${fil}</div>
    <div class="grp"><b>Curso</b>${cur}</div>
    <div class="grp"><b>Sexo</b>${sx}</div>
    ${ruas?`<div class="grp"><b>Ruas mais frequentes (total)</b>${ruas}</div>`:''}</div>`;
}
function barRows(el,entries,labels,total,colorFn){
  const max=Math.max(1,...entries.map(e=>e[1]));
  el.innerHTML=entries.map(([k,v])=>{
    const pct=Math.round(100*v/(total||1));
    const col=colorFn?colorFn(k):'var(--red)';
    return `<div class="bar-row"><div class="nm">${labels[k]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${100*v/max}%;background:${col}"></div></div>
      <div class="ct">${v}</div></div>`;
  }).join('')||'<div style="color:var(--muted);font-size:12px">—</div>';
}
function renderCharts(counts,total){
  // curso
  const cur={};counts.forEach(o=>{for(const k in o.cur)cur[k]=(cur[k]||0)+o.cur[k];});
  barRows(document.getElementById('ch-curso'),Object.entries(cur).sort((a,b)=>b[1]-a[1]),CUR,total);
  // sexo
  const sex={};counts.forEach(o=>{for(const k in o.sex)sex[k]=(sex[k]||0)+o.sex[k];});
  const SLAB={'0':'Masculino','1':'Feminino','2':'Não informado'};
  barRows(document.getElementById('ch-sexo'),Object.entries(sex).sort((a,b)=>b[1]-a[1]),SLAB,total,
    k=>({'0':'#1E88A8','1':'#D32F2F','2':'#9AA1AC'}[k]));
  // ranking
  const rk=B.map((b,i)=>[i,counts[i].total]).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const max=Math.max(1,...rk.map(x=>x[1]));
  document.getElementById('ch-rank').innerHTML=rk.map(([i,v])=>{
    const b=B[i];
    return `<div class="bar-row" data-i="${i}"><span class="city-dot" style="background:${cityColor(b.cidade)}"></span>
      <div class="nm" title="${b.nome}">${b.nome}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${100*v/max}%"></div></div>
      <div class="ct">${v}</div></div>`;
  }).join('');
  document.querySelectorAll('#ch-rank .bar-row').forEach(el=>el.onclick=()=>{
    const b=B[+el.dataset.i];map.flyTo([b.lat,b.lon],14,{duration:.8});
  });
}
// legend
const legend=L.control({position:'bottomright'});
legend.onAdd=function(){
  const d=L.DomUtil.create('div','legend');d.id='legend';return d;};
legend.addTo(map);
function renderLegend(){
  const el=document.getElementById('legend');if(!el)return;
  let html='<h4>'+(colorByFilial?'Filial':'Cidade')+'</h4>';
  if(colorByFilial){FIL.forEach((f,i)=>html+=`<div class="it"><span style="background:${FIL_PAL[i]}"></span>${f.replace('Centro de Ensino Técnico Ideal','C. Téc. Ideal')}</div>`);}
  else{['Belém','Ananindeua','Marituba'].forEach(c=>html+=`<div class="it"><span style="background:${cityColor(c)}"></span>${c}</div>`);}
  html+='<div class="sizes"><div><i style="width:12px;height:12px"></i>poucos</div><div><i style="width:24px;height:24px"></i></div><div><i style="width:40px;height:40px"></i>muitos</div></div>';
  el.innerHTML=html;
}

// events
['f-filial','f-curso','f-sexo'].forEach(id=>document.getElementById(id).onchange=render);
document.getElementById('t-color').onclick=function(){
  colorByFilial=!colorByFilial;this.textContent='Cor: '+(colorByFilial?'Filial':'Cidade');
  this.classList.toggle('active',colorByFilial);renderLegend();render();};
document.getElementById('t-theme').onclick=function(){
  const dark=document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme=dark?'light':'dark';
  this.textContent=dark?'🌙':'☀️';setTiles();renderLegend();render();};

document.getElementById('foot-note').textContent=
  `${DATA.resumo.total_geo.toLocaleString('pt-BR')} de ${DATA.resumo.total_alunos.toLocaleString('pt-BR')} alunos geolocalizados (${Math.round(100*DATA.resumo.total_geo/DATA.resumo.total_alunos)}%) · ${B.length} bairros`;

renderLegend();render();
</script>
</body>
